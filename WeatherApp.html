<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Details ⛅</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }

    .weather-app {
      background: rgba(0, 0, 0, 0.6);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 350px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 20px;
      font-size: 1.8rem;
    }

    input {
      padding: 10px;
      width: 70%;
      border: none;
      border-radius: 8px;
      outline: none;
      font-size: 1rem;
      margin-bottom: 12px;
    }

    button {
      padding: 10px 15px;
      margin-left: 0;
      border: none;
      border-radius: 8px;
      background: #ff9800;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #e68900;
    }

    .weather-result {
      margin-top: 20px;
    }

    .weather-result img {
      width: 100px;
      margin: 15px 0;
    }

    .temp {
      font-size: 2rem;
      font-weight: bold;
    }

    .desc {
      font-size: 1.2rem;
      margin: 10px 0;
    }
  </style>
</head>
<body>

  <div class="weather-app">
    <h1>🌤️ Weather Details</h1>
    <input type="text" id="cityInput" placeholder="Enter city...">
    <button onclick="getWeather()">Get Weather</button>

    <div class="weather-result" id="weatherResult"></div>
  </div>

  <script>
    const apiKey = "a98f6488354c481bb5c113821251409"; // ✅ Your WeatherAPI key

    async function getWeather() {
      const city = document.getElementById("cityInput").value.trim();
      if (city === "") {
        alert("Please enter a city name!");
        return;
      }

      const url = `https://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${city}&aqi=no`;

      try {
        const res = await fetch(url);
        const data = await res.json();

        const weatherResult = document.getElementById("weatherResult");
        weatherResult.innerHTML = "";

        if (data.location) {
          weatherResult.innerHTML = `
            <h2>${data.location.name}, ${data.location.country}</h2>
            <img src="https:${data.current.condition.icon}" alt="Weather Icon">
            <p class="temp">${data.current.temp_c}°C</p>
            <p class="desc">${data.current.condition.text}</p>
            <p>Humidity: ${data.current.humidity}%</p>
            <p>Wind: ${data.current.wind_kph} kph</p>
          `;
        } else {
          weatherResult.innerHTML = `<p>❌ City not found!</p>`;
        }
      } catch (error) {
        console.error("Error fetching data:", error);
        document.getElementById("weatherResult").innerHTML = "<p>⚠️ Error fetching weather data.</p>";
      }
    }
  </script>

</body>
</html>
