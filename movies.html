 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Search App 🎬</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
        url("C:/Users/Bharath Chandra/OneDrive/Pictures/ironman.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
  color: #e0e7ff; /* Soft blue font color */
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 25px;
  color: #00bcd4; /* Cyan for heading */
      font-size: 2.2rem;
      font-weight: 600;
    }

    .search-box {
      margin-bottom: 25px;
    }

    input {
      padding: 12px;
      width: 280px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
  box-shadow: 0 0 10px #00bcd4;
    }

    button {
      padding: 12px 18px;
      border: none;
  background: #4f46e5; /* Indigo button */
  color: #e0e7ff; /* Soft blue text */
      font-weight: bold;
      cursor: pointer;
      border-radius: 8px;
      margin-left: 8px;
      font-size: 1rem;
      transition: 0.3s;
    }

    button:hover {
  background: #6366f1; /* Lighter indigo on hover */
      transform: scale(1.05);
    }

    .movie-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
      margin-top: 30px;
      justify-items: center;
    }

    .movie {
      width: 220px;
      background: rgba(42, 42, 42, 0.9);
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.6);
      transition: 0.3s;
      text-align: center;
    }

    .movie:hover {
      transform: translateY(-8px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.8);
    }

    .movie img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      border-radius: 10px;
      transition: 0.3s;
    }

    .movie img:hover {
      transform: scale(1.05);
    }

    .movie h3 {
      margin: 12px 0 5px;
  color: #00bcd4; /* Cyan for movie title */
      font-size: 1.05rem;
    }

    .movie p {
  color: #e0e7ff;
      font-size: 0.9rem;
    }

    .imdb-link {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 14px;
  background: #00bcd4;
  color: #fff;
      font-weight: bold;
      border-radius: 6px;
      text-decoration: none;
      transition: 0.3s;
      font-size: 0.9rem;
    }

    .imdb-link:hover {
  background: #0097a7;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <h1>🎬 Movie Search App</h1>

  <div class="search-box">
    <input type="text" id="movieInput" placeholder="Enter movie name...">
    <button onclick="searchMovie()">Search</button>
  </div>

  <div class="movie-container" id="movieContainer"></div>

  <script>
    const apiKey = "bc956b51"; // ✅ Your API key

    async function searchMovie() {
      const movieName = document.getElementById("movieInput").value;
      if (movieName === "") {
        alert("Please enter a movie name!");
        return;
      }

      const url = `https://www.omdbapi.com/?s=${movieName}&apikey=${apiKey}`;
      const res = await fetch(url);
      const data = await res.json();

      const movieContainer = document.getElementById("movieContainer");
      movieContainer.innerHTML = "";

      if (data.Search) {
        data.Search.forEach(movie => {
          const imdbLink = `https://www.imdb.com/title/${movie.imdbID}/`;
          movieContainer.innerHTML += `
            <div class="movie">
              <img src="${movie.Poster !== "N/A" ? movie.Poster : 'https://via.placeholder.com/220x320'}" alt="${movie.Title}">
              <h3>${movie.Title}</h3>
              <p>Year: ${movie.Year}</p>
              <a class="imdb-link" href="${imdbLink}" target="_blank">View on IMDb</a>
            </div>
          `;
        });
      } else {
        movieContainer.innerHTML = "<p>No movies found 😢</p>";
      }
    }
  </script>

</body>
</html>
